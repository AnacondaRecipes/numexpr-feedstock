{% set name = "numexpr" %}
{% set version = "2.14.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 4be00b1086c7b7a5c32e31558122b7b80243fe098579b170967da83f3152b48b

build:
  number: 1
  skip: true  # [py<310]
  script:
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - mkl-devel {{ mkl }}  # [blas_impl == 'mkl' and x86]
    - openblas-devel {{ openblas }}  # [blas_impl == 'openblas' and x86]
    - numpy {{ numpy }}
    - python
    - pip
    - setuptools >=77.0.0
  run:
    - python
    - numpy >=1.23.0

test:
  # imports are included to run_test.py
  requires:
    - nomkl  # [x86 and blas_impl == 'openblas']
    - pip
    - pytest >=7.0.0
  commands:
    - pip check

about:
  home: https://github.com/pydata/numexpr
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Fast numerical expression evaluator for NumPy
  description: |
    Numexpr is a fast numerical expression evaluator for NumPy. With it,
    expressions that operate on arrays (like "3*a+4*b") are accelerated and use
    less memory than doing the same calculation in Python.
  doc_url: https://numexpr.readthedocs.io
  dev_url: https://github.com/pydata/numexpr

extra:
  recipe-maintainers:
    - msarahan
    - ocefpaf
    - scopatz
    - djkirkham
